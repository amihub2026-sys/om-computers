<section class="add-service-page">

  <div class="form-card">

    <h1>Add Service</h1>
    <p>Enter service details for OM Computers.</p>

    <form>

      <div class="form-grid">
        <input type="text" placeholder="Service Name">
        <input type="text" placeholder="Category">
        <input type="text" placeholder="Service Mode">
        <input type="text" placeholder="Estimated Duration">
        <input type="text" placeholder="Availability">
        <input type="number" placeholder="Starting Price">
      </div>

      <input type="file">

      <textarea rows="5" placeholder="Service Description"></textarea>

      <textarea rows="4" placeholder="Service Includes"></textarea>

      <div class="buttons">
        <button type="submit">Save Service</button>
        <button type="button" class="cancel">Cancel</button>
      </div>

    </form>

  </div>

</section>
