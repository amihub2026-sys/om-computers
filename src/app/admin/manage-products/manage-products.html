<div class="admin-header">
  <div>
    <h1>Manage Products</h1>
    <p>Add, edit and manage product stock details.</p>
  </div>

  <a routerLink="/admin/products/add" class="add-btn">
    Add Product
  </a>
</div>

<div class="product-table">
  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Product</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let product of products">
        <td>
        <img
  [src]="'http://localhost:5000/uploads/products/' + product.image"
  alt="Product Image"
  width="80"
  height="80">
        </td>

        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>₹{{ product.price }}</td>

        <td>
          <span [class.stock]="product.stock > 5" [class.low]="product.stock <= 5">
            {{ product.stock > 5 ? 'In Stock' : 'Low Stock' }}
          </span>
        </td>

        <td>
          <button class="edit">Edit</button>
          <button class="delete">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
