<section class="add-product-page">

  <div class="form-card">

    <h1>Add Product</h1>
    <p>Enter product details for OM Computers.</p>

    <form>

      <div class="form-grid">
        <input type="text" placeholder="Product Name">
        <input type="text" placeholder="Category">
        <input type="text" placeholder="Brand">
        <input type="text" placeholder="Model">
        <input type="number" placeholder="Price">
        <input type="number" placeholder="Discount Price">
        <input type="number" placeholder="Stock">
        <input type="text" placeholder="Warranty">
      </div>

      <input type="file">

      <textarea rows="5" placeholder="Product Description"></textarea>

      <div class="buttons">
        <button type="submit">Save Product</button>
        <button type="button" class="cancel">Cancel</button>
      </div>

    </form>

  </div>

</section>
