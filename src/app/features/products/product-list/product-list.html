<section class="products-page">

  <aside class="filter-sidebar">
    <h2>Advanced<br>Filtering</h2>

    <div class="filter-group">
      <h3>Category</h3>
      <label *ngFor="let category of categories">
        <input type="checkbox" (change)="toggleFilter(selectedCategories, category)">
        {{ category }}
      </label>
    </div>

    <div class="filter-group">
      <h3>Brand</h3>
      <label *ngFor="let brand of brands">
        <input type="checkbox" (change)="toggleFilter(selectedBrands, brand)">
        {{ brand }}
      </label>
    </div>

    <div class="filter-group">
      <h3>Processor</h3>
      <label *ngFor="let processor of processors">
        <input type="checkbox" (change)="toggleFilter(selectedProcessors, processor)">
        {{ processor }}
      </label>
    </div>

    <div class="filter-group">
      <h3>Price</h3>
      <input type="range" min="5000" max="150000" [(ngModel)]="maxPrice">
      <p>Up to ₹{{ maxPrice }}</p>
    </div>
  </aside>

  <main class="products-content">

    <input
      class="search-box"
      type="text"
      placeholder="Search gaming PCs, laptops, accessories..."
      [(ngModel)]="searchText"
    >

    <div class="category-menu">
  <div class="category-track">
    <span *ngFor="let category of categories">{{ category }}</span>
    <span *ngFor="let category of categories">{{ category }}</span>
  </div>
</div>

    <div class="products-grid">

      <div class="product-card" *ngFor="let product of filteredProducts">

        <div class="image-box">
          <span class="badge" *ngIf="product.badge">{{ product.badge }}</span>
          <img [src]="product.image" [alt]="product.name">
        </div>

        <div class="product-body">
          <h3>{{ product.name }}</h3>

          <ul>
            <li *ngFor="let spec of product.specs">{{ spec }}</li>
          </ul>

          <h4>
            ₹{{ product.price }}
            <del>₹{{ product.oldPrice }}</del>
          </h4>
<button class="cart-btn" [routerLink]="['/cart']">
  Add to Cart
</button>

<button class="details-btn" [routerLink]="['/products', product.id]">
  View Details
</button>
        </div>

      </div>

    </div>

  </main>

</section>
