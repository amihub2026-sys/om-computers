<section class="contact-page">

 <div class="page-header">

  <span class="sub-title">
   Contact Us
</span>

  <h1>Get in Touch With <span>OM Computers</span></h1>

  <p>
    We are here to help with computer sales, repairs, networking,
    and complete IT solutions for your home and business.
  </p>

</div>
  <div class="contact-wrapper">

    <!-- Left -->

   <div class="map-section">

  <div class="map-card">
    <div class="map-content">
      <span>📍 Our Location</span>
      <h2>Visit OM Computers</h2>
      <p>123 Main Road, Madurai, Tamil Nadu</p>
    </div>

    <iframe
      src="https://www.google.com/maps?q=Madurai&output=embed"
      loading="lazy">
    </iframe>
  </div>

</div>
    <!-- Right -->

<div class="contact-form">

  <h2>Send Enquiry</h2>

  <input
    type="text"
    placeholder="Your Name"
    [(ngModel)]="contactForm.name"
    name="name"
  >

  <input
    type="email"
    placeholder="Email Address"
    [(ngModel)]="contactForm.email"
    name="email"
  >

  <input
    type="tel"
    placeholder="Mobile Number"
    [(ngModel)]="contactForm.phone"
    name="phone"
  >

  <textarea
    rows="5"
    placeholder="Your Message"
    [(ngModel)]="contactForm.message"
    name="message"
  ></textarea>

  <button
    type="button"
    (click)="sendMessage()"
    [disabled]="isSending">
    {{ isSending ? 'Sending...' : 'Send Message' }}
  </button>

</div>

  </div>

 
</section>
