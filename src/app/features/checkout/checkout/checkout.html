<section class="checkout-page">

  <div class="page-header">
    <h1>Checkout</h1>
    <p>Complete your order by filling in the details below.</p>

    <a routerLink="/cart" class="back-btn">
      ← Back to Cart
    </a>
  </div>

  <div class="loading" *ngIf="isLoading">
    Loading checkout...
  </div>

  <div class="checkout-container" *ngIf="!isLoading && cartItems.length > 0">

    <div class="billing-section">

      <h2>Billing Details</h2>

      <div class="form-grid">

        <input
          type="text"
          placeholder="Full Name"
          [(ngModel)]="orderData.customerName">

        <input
          type="tel"
          placeholder="Mobile Number"
          [(ngModel)]="orderData.phone">

        <input
          type="email"
          placeholder="Email Address"
          [(ngModel)]="orderData.email">

        <input
          type="text"
          placeholder="City"
          [(ngModel)]="orderData.city">

      </div>

      <textarea
        rows="4"
        placeholder="Full Delivery Address"
        [(ngModel)]="orderData.address">
      </textarea>

      <select [(ngModel)]="orderData.paymentMethod">
        <option value="">Select Payment Method</option>
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="Credit / Debit Card">Credit / Debit Card</option>
      </select>

    </div>

    <div class="summary-section">

      <h2>Order Summary</h2>

      <div
        class="summary-item"
        *ngFor="let item of cartItems; trackBy: trackByCartId">

        <span>
          {{ item.productName }} × {{ item.quantity }}
        </span>

        <span>
          ₹{{ item.total }}
        </span>

      </div>

      <hr>

      <div class="summary-item total">
        <span>Total</span>
        <span>₹{{ totalAmount }}</span>
      </div>

      <button
        class="place-order-btn"
        [disabled]="isPlacingOrder"
        (click)="placeOrder()">

        {{ isPlacingOrder ? 'Placing Order...' : 'Place Order' }}

      </button>

    </div>

  </div>

  <div class="empty-cart" *ngIf="!isLoading && cartItems.length === 0">
    <h2>Your cart is empty</h2>
    <p>Please add products before checkout.</p>

    <a routerLink="/products" class="back-btn">
      Explore Products
    </a>
  </div>

</section>
