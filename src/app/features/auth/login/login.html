<section class="login-page">

  <div class="login-card">

    <div class="login-icon">🔒</div>

    <span class="login-tag">SIGN IN</span>

    <h2>Welcome <span>Back!</span></h2>

    <p class="login-subtitle">
      Login to your OM Computers account
    </p>

    <form>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="loginData.email" name="email" placeholder="Enter email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="Enter password">
      </div>

      <button type="button" (click)="login()">
        Login
      </button>

    </form>

    <p class="bottom-text">
      Don't have an account?
      <a routerLink="/register">Register Now</a>
    </p>

  </div>

</section>
