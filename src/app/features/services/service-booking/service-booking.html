<section class="booking-page">
<div class="back-section">
  <a routerLink="/services/1" class="back-btn">
    ← Back to Service Details
  </a>
</div>
  <div class="booking-card">

    <div class="booking-header">
      <h1>Book a Service</h1>
      <p>
        Fill in your details and our team will contact you shortly.
      </p>
    </div>

    <form class="booking-form">

      <div class="form-grid">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name">
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" placeholder="Enter mobile number">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Service Type</label>
          <select>
            <option>Select Service</option>
            <option>Laptop Repair</option>
            <option>Desktop Service</option>
            <option>Printer Service</option>
            <option>Networking</option>
            <option>Data Recovery</option>
          </select>
        </div>

        <div class="form-group">
          <label>Preferred Date</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Preferred Time</label>
          <input type="time">
        </div>

      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea rows="3" placeholder="Enter your address"></textarea>
      </div>

      <div class="form-group">
        <label>Problem Description</label>
        <textarea rows="5" placeholder="Describe your issue"></textarea>
      </div>

<button
  type="button"
  class="submit-btn"
  (click)="bookService()">
  Book Service
</button>

    </form>

  </div>

</section>
